<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lab 3</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background: #f5f7fb;
        }

        nav {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            opacity: 0.7;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        .flash {
            padding: 10px;
            background: #ffe4e6;
            border: 1px solid #f87171;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .success {
            background: #dcfce7;
            border-color: #4ade80;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #e0f2fe;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<nav>
    <a href="{{ url_for('index') }}">Главная</a>

    {% if current_user.is_authenticated %}
        <a href="{{ url_for('secret') }}">Секретная</a>
        <a href="{{ url_for('logout') }}">Выйти</a>
    {% else %}
        <a href="{{ url_for('login') }}">Войти</a>
    {% endif %}
</nav>

<div class="container">

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</div>

</body>
</html>
